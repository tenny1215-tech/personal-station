<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>量化回测 | 投资账本</title>
<script src="https://unpkg.com/lightweight-charts@4.1.7/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg:#0d0f1a;--card:#161928;--card2:#1e2238;--border:#262d4a;
  --accent:#5b7fff;--green:#34d399;--green-dim:#064e3b;
  --red:#f87171;--red-dim:#7f1d1d;--yellow:#fbbf24;
  --text:#e2e8f0;--muted:#64748b;
  --font:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);}

/* LOCK */
#lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;}
.lock-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:40px 32px;width:90%;max-width:360px;text-align:center;}
.lock-icon{font-size:48px;margin-bottom:12px;}
.lock-title{font-size:22px;font-weight:700;margin-bottom:6px;}
.lock-sub{font-size:14px;color:var(--muted);margin-bottom:24px;}
#lock-input{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:18px;color:var(--text);width:100%;text-align:center;letter-spacing:4px;outline:none;font-family:var(--font);-webkit-appearance:none;margin-bottom:8px;}
#lock-input:focus{border-color:var(--accent);}
#lock-error{color:var(--red);font-size:13px;min-height:20px;margin-bottom:8px;}
#lock-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:12px;font-size:16px;font-weight:600;width:100%;cursor:pointer;font-family:var(--font);}

/* APP */
#app{display:none;height:100%;flex-direction:column;}

/* HEADER */
.cr-header{background:var(--card);border-bottom:1px solid var(--border);padding:52px 20px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.cr-back{color:var(--accent);text-decoration:none;font-size:14px;font-weight:600;}
.cr-header-title{font-size:18px;font-weight:700;}
.cr-header-right{width:60px;text-align:right;}

/* MAIN LAYOUT */
.cr-layout{flex:1;min-height:0;display:grid;grid-template-columns:260px 1fr 290px;gap:12px;padding:12px;overflow:hidden;}

/* SIDEBAR */
.cr-sidebar{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
.cr-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;}
.cr-form-group{display:flex;flex-direction:column;gap:5px;}
.cr-form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cr-label{font-size:12px;color:var(--muted);}
.cr-input,.cr-select{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:14px;color:var(--text);width:100%;font-family:var(--font);outline:none;-webkit-appearance:none;appearance:none;}
.cr-input:focus,.cr-select:focus{border-color:var(--accent);}
.cr-strategy-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.cr-tab{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:var(--font);}
.cr-tab.active{background:rgba(91,127,255,0.15);border-color:var(--accent);color:var(--accent);}
.cr-run-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);margin-top:4px;}
.cr-run-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* CHART AREA */
.cr-main{display:flex;flex-direction:column;gap:8px;min-height:0;}
.cr-chart-box{flex:1;min-height:0;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;position:relative;}
#cr-chart{width:100%;height:100%;}
.cr-chart-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:14px;pointer-events:none;}
.cr-chart-empty .icon{font-size:36px;}

/* RESULTS PANEL */
.cr-results-panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.cr-results-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--muted);font-size:14px;}
.cr-results-empty .icon{font-size:36px;}
.cr-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cr-stat-card{background:var(--card2);border-radius:12px;padding:10px 12px;}
.cr-stat-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.cr-stat-value{font-size:17px;font-weight:700;line-height:1.2;}
.cr-stat-sub{font-size:10px;color:var(--muted);margin-top:3px;}
.cr-trades-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;}
.cr-trade-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(38,45,74,0.5);}
.cr-trade-row:last-child{border-bottom:none;}
.cr-trade-date{font-size:12px;font-weight:600;}
.cr-trade-reason{font-size:10px;color:var(--muted);margin-top:2px;}
.cr-trade-right{text-align:right;}
.cr-trade-status{font-size:12px;font-weight:600;}
.cr-trade-detail{font-size:10px;color:var(--muted);margin-top:2px;}

/* LOADING */
.cr-loading{display:none;position:fixed;inset:0;background:rgba(13,15,26,0.8);z-index:100;align-items:center;justify-content:center;}
.cr-loading-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 36px;text-align:center;}
.cr-dots{display:flex;justify-content:center;gap:8px;margin-bottom:12px;}
.cr-dots span{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite;}
.cr-dots span:nth-child(2){animation-delay:.2s;}
.cr-dots span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(.8);opacity:.4;}40%{transform:scale(1.2);opacity:1;}}
.cr-loading-text{font-size:14px;color:var(--muted);}

/* MOBILE */
@media (max-width:900px){
  .cr-layout{grid-template-columns:1fr;grid-template-rows:auto auto auto;overflow:visible;height:auto;}
  #app{height:auto;min-height:100%;}
  .cr-chart-box{height:280px;flex:none;}
  .cr-results-panel{min-height:400px;}
}
</style>
</head>
<body>

<!-- 锁屏 -->
<div id="lock">
  <div class="lock-box">
    <div class="lock-icon">📈</div>
    <div class="lock-title">量化回测</div>
    <div class="lock-sub">请输入密码</div>
    <input type="password" id="lock-input" placeholder="密码" autocomplete="off">
    <div id="lock-error"></div>
    <button id="lock-btn">进入</button>
  </div>
</div>

<!-- 主应用 -->
<div id="app">
  <header class="cr-header">
    <a href="/" class="cr-back">← 账本</a>
    <div class="cr-header-title">📈 量化回测</div>
    <div class="cr-header-right"></div>
  </header>

  <div class="cr-layout">

    <!-- 左侧：配置 -->
    <aside class="cr-sidebar">
      <div class="cr-section-title">配置</div>

      <div class="cr-form-group">
        <label class="cr-label">交易对</label>
        <select class="cr-select" id="cr-symbol">
          <option value="BTCUSDT">BTC / USDT</option>
          <option value="ETHUSDT">ETH / USDT</option>
          <option value="SOLUSDT">SOL / USDT</option>
          <option value="BNBUSDT">BNB / USDT</option>
          <option value="XRPUSDT">XRP / USDT</option>
        </select>
      </div>

      <div class="cr-form-row">
        <div class="cr-form-group">
          <label class="cr-label">开始日期</label>
          <input type="date" class="cr-input" id="cr-start">
        </div>
        <div class="cr-form-group">
          <label class="cr-label">结束日期</label>
          <input type="date" class="cr-input" id="cr-end">
        </div>
      </div>

      <div class="cr-form-group">
        <label class="cr-label">策略</label>
        <div class="cr-strategy-row">
          <button class="cr-tab active" data-s="dca">纯定投</button>
          <button class="cr-tab" data-s="trend">趋势定投</button>
        </div>
      </div>

      <div class="cr-form-row">
        <div class="cr-form-group">
          <label class="cr-label">每次金额 $</label>
          <input type="number" class="cr-input" id="cr-amount" value="100" min="1">
        </div>
        <div class="cr-form-group">
          <label class="cr-label">频率</label>
          <select class="cr-select" id="cr-freq">
            <option value="weekly">每周</option>
            <option value="monthly">每月</option>
          </select>
        </div>
      </div>

      <div class="cr-form-group" id="cr-ma-group" style="display:none">
        <label class="cr-label">均线周期（天）</label>
        <input type="number" class="cr-input" id="cr-ma-period" value="200" min="5" max="500">
        <div style="font-size:10px;color:var(--muted);margin-top:4px">仅当价格站上均线时买入</div>
      </div>

      <button class="cr-run-btn" id="cr-run-btn">▶ 开始回测</button>
    </aside>

    <!-- 中间：K线图 -->
    <main class="cr-main">
      <div class="cr-chart-box" id="cr-chart-box">
        <div id="cr-chart"></div>
        <div class="cr-chart-empty" id="cr-chart-empty">
          <div class="icon">🕯️</div>
          <div>配置参数后点击「开始回测」</div>
        </div>
      </div>
    </main>

    <!-- 右侧：结果 -->
    <section class="cr-results-panel">
      <div class="cr-results-empty" id="cr-results-empty">
        <div class="icon">📊</div>
        <div>回测结果将显示在这里</div>
      </div>
      <div id="cr-results-content" style="display:none">
        <div class="cr-stat-grid" id="cr-stat-grid"></div>
        <div class="cr-trades-title" style="margin-top:4px">交易记录</div>
        <div id="cr-trades-list"></div>
      </div>
    </section>

  </div>

  <!-- 加载中 -->
  <div class="cr-loading" id="cr-loading">
    <div class="cr-loading-box">
      <div class="cr-dots"><span></span><span></span><span></span></div>
      <div class="cr-loading-text">获取数据并计算中…</div>
    </div>
  </div>
</div>

<script>
// ── 密码锁 ──────────────────────────────────────────────────
const PASSWORD = "1215";
function checkAuth() { return sessionStorage.getItem("cr_auth") === "ok"; }
function unlock() {
  sessionStorage.setItem("cr_auth", "ok");
  document.getElementById("lock").style.display = "none";
  document.getElementById("app").style.display = "flex";
  initPage();
}
document.getElementById("lock-btn").addEventListener("click", () => {
  if (document.getElementById("lock-input").value === PASSWORD) unlock();
  else {
    document.getElementById("lock-error").textContent = "密码错误";
    document.getElementById("lock-input").value = "";
  }
});
document.getElementById("lock-input").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("lock-btn").click();
});
if (checkAuth()) unlock();

// ── 状态 ─────────────────────────────────────────────────────
let chart = null, candleSeries = null, maSeries = null;
let currentStrategy = "dca";

// ── 初始化页面 ────────────────────────────────────────────────
function initPage() {
  // 默认日期：近一年
  const end = new Date();
  const start = new Date();
  start.setFullYear(start.getFullYear() - 1);
  document.getElementById("cr-end").value = end.toISOString().slice(0, 10);
  document.getElementById("cr-start").value = start.toISOString().slice(0, 10);

  // 策略 tab
  document.querySelectorAll(".cr-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".cr-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      currentStrategy = tab.dataset.s;
      document.getElementById("cr-ma-group").style.display = currentStrategy === "trend" ? "block" : "none";
    });
  });

  // 运行
  document.getElementById("cr-run-btn").addEventListener("click", runBacktest);

  // 初始化图表
  initChart();
}

// ── 图表初始化 ────────────────────────────────────────────────
function initChart() {
  const box = document.getElementById("cr-chart-box");
  const container = document.getElementById("cr-chart");

  chart = LightweightCharts.createChart(container, {
    width: box.clientWidth || 600,
    height: box.clientHeight || 400,
    layout: { background: { type: "solid", color: "#0d0f1a" }, textColor: "#94a3b8" },
    grid: { vertLines: { color: "#1a1f35" }, horzLines: { color: "#1a1f35" } },
    rightPriceScale: { borderColor: "#262d4a" },
    timeScale: { borderColor: "#262d4a", timeVisible: true },
    crosshair: { mode: 1 },
  });

  candleSeries = chart.addCandlestickSeries({
    upColor: "#34d399", downColor: "#f87171",
    borderUpColor: "#34d399", borderDownColor: "#f87171",
    wickUpColor: "#34d399", wickDownColor: "#f87171",
  });

  maSeries = chart.addLineSeries({
    color: "#fbbf24", lineWidth: 1,
    lastValueVisible: false, priceLineVisible: false,
  });

  new ResizeObserver(() => {
    if (chart) chart.resize(box.clientWidth, box.clientHeight);
  }).observe(box);
}

// ── 运行回测 ─────────────────────────────────────────────────
async function runBacktest() {
  const startVal = document.getElementById("cr-start").value;
  const endVal = document.getElementById("cr-end").value;
  if (!startVal || !endVal) { alert("请选择回测时间范围"); return; }

  const runBtn = document.getElementById("cr-run-btn");
  runBtn.disabled = true;
  document.getElementById("cr-loading").style.display = "flex";

  try {
    const body = {
      symbol: document.getElementById("cr-symbol").value,
      strategy: currentStrategy,
      startTime: new Date(startVal).getTime(),
      endTime: new Date(endVal).getTime() + 86400000,
      amount: parseFloat(document.getElementById("cr-amount").value) || 100,
      frequency: document.getElementById("cr-freq").value,
      maPeriod: parseInt(document.getElementById("cr-ma-period").value) || 200,
    };

    const resp = await fetch("/api/backtest", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    renderChart(data.candles, data.maData, data.buys);
    renderResults(data.stats, data.buys, currentStrategy, body.maPeriod);

    if (window.innerWidth < 900) {
      document.getElementById("cr-chart-box").scrollIntoView({ behavior: "smooth" });
    }
  } catch (e) {
    alert("回测失败：" + e.message);
  }

  document.getElementById("cr-loading").style.display = "none";
  runBtn.disabled = false;
}

// ── 渲染图表 ─────────────────────────────────────────────────
function renderChart(candles, maData, buys) {
  document.getElementById("cr-chart-empty").style.display = "none";

  candleSeries.setData(candles);
  maSeries.setData(maData && maData.length ? maData : []);

  const markers = buys
    .filter(b => b.executed)
    .map(b => ({
      time: b.time,
      position: "belowBar",
      color: "#34d399",
      shape: "arrowUp",
      text: "买",
      size: 1,
    }));
  candleSeries.setMarkers(markers);
  chart.timeScale().fitContent();
}

// ── 渲染结果 ─────────────────────────────────────────────────
function renderResults(stats, buys, strategy, maPeriod) {
  document.getElementById("cr-results-empty").style.display = "none";
  document.getElementById("cr-results-content").style.display = "block";

  const pos = stats.totalReturn >= 0;
  const rc = pos ? "var(--green)" : "var(--red)";
  const sign = pos ? "+" : "";

  const pnl = +(stats.currentValue - stats.totalInvested).toFixed(2);
  const pnlSign = pnl >= 0 ? "+" : "";

  document.getElementById("cr-stat-grid").innerHTML = `
    <div class="cr-stat-card">
      <div class="cr-stat-label">总投入</div>
      <div class="cr-stat-value">$${stats.totalInvested.toLocaleString()}</div>
    </div>
    <div class="cr-stat-card">
      <div class="cr-stat-label">当前价值</div>
      <div class="cr-stat-value" style="color:${rc}">$${stats.currentValue.toLocaleString()}</div>
      <div class="cr-stat-sub" style="color:${rc}">${pnlSign}$${Math.abs(pnl).toLocaleString()}</div>
    </div>
    <div class="cr-stat-card">
      <div class="cr-stat-label">总收益率</div>
      <div class="cr-stat-value" style="color:${rc}">${sign}${stats.totalReturn}%</div>
    </div>
    <div class="cr-stat-card">
      <div class="cr-stat-label">最大回撤</div>
      <div class="cr-stat-value" style="color:var(--red)">-${stats.maxDrawdown}%</div>
    </div>
    <div class="cr-stat-card">
      <div class="cr-stat-label">执行次数</div>
      <div class="cr-stat-value">${stats.executedCount}</div>
      ${strategy === "trend" ? `<div class="cr-stat-sub">跳过 ${stats.skippedCount} 次</div>` : ""}
    </div>
    <div class="cr-stat-card">
      <div class="cr-stat-label">平均成本</div>
      <div class="cr-stat-value">$${stats.avgBuyPrice.toLocaleString()}</div>
      <div class="cr-stat-sub">最新价 $${stats.lastPrice.toLocaleString()}</div>
    </div>
  `;

  if (strategy === "trend") {
    document.getElementById("cr-stat-grid").insertAdjacentHTML("afterend", `
      <div style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--yellow);">
        📌 趋势条件：价格站上 MA${maPeriod} 才买入，共跳过 ${stats.skippedCount} 次
      </div>
    `);
  }

  // 交易记录（倒序）
  const rows = [...buys].reverse().map(b => {
    const sc = b.executed ? "var(--green)" : "var(--muted)";
    const st = b.executed ? "✓ 买入" : "✗ 跳过";
    return `<div class="cr-trade-row">
      <div>
        <div class="cr-trade-date">${b.date}</div>
        ${b.reason ? `<div class="cr-trade-reason">${b.reason}</div>` : ""}
      </div>
      <div class="cr-trade-right">
        <div class="cr-trade-status" style="color:${sc}">${st}</div>
        ${b.executed ? `<div class="cr-trade-detail">$${b.amount} @ $${b.price.toLocaleString()}</div>` : ""}
      </div>
    </div>`;
  }).join("");

  document.getElementById("cr-trades-list").innerHTML = rows ||
    `<div style="padding:16px;text-align:center;color:var(--muted);">暂无交易记录</div>`;
}
</script>
</body>
</html>
