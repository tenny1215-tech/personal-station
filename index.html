<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tenny's 留言板</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌈</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOP BAR -->
  <header id="topbar">
    <div class="top-left">
      <span class="site-title">🌈 Tenny's 留言板</span>
      <span class="note-count" id="note-count"></span>
    </div>
    <button class="admin-btn" id="admin-btn" title="管理员">🔒</button>
  </header>

  <!-- CANVAS WRAP -->
  <div id="canvas-wrap">
    <svg id="grid-svg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="1" fill="#d1d5db" />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#dots)" />
    </svg>
    <svg id="lines-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="canvas"></div>
  </div>

  <!-- ZOOM CONTROLS (desktop only) -->
  <div id="zoom-controls">
    <button class="zoom-btn" id="zoom-out">−</button>
    <span id="zoom-label">100%</span>
    <button class="zoom-btn" id="zoom-in">+</button>
    <button class="zoom-btn" id="zoom-reset">⌂</button>
  </div>

  <!-- BOTTOM INPUT BAR -->
  <div id="inputbar">
    <div class="inputbar-inner">
      <input id="inp-name" type="text" placeholder="名字（可不填）" maxlength="16" autocomplete="off" />
      <div class="inp-sep"></div>
      <input id="inp-text" type="text" placeholder="留下你的留言 ✨" maxlength="100" autocomplete="off" />
      <button id="inp-send">发送</button>
    </div>
  </div>

  <!-- ADMIN MODAL -->
  <div id="admin-modal" class="modal-wrap" style="display:none">
    <div class="modal">
      <div class="modal-title">🔑 管理员登录</div>
      <input id="admin-pass" type="password" placeholder="请输入密码" maxlength="20" />
      <div class="modal-error" id="admin-error"></div>
      <div class="modal-btns">
        <button class="btn-cancel" id="admin-cancel">取消</button>
        <button class="btn-confirm" id="admin-confirm">登录</button>
      </div>
    </div>
  </div>

  <!-- REPLY MODAL -->
  <div id="reply-modal" class="modal-wrap" style="display:none">
    <div class="modal">
      <div class="modal-title">💬 回复</div>
      <div class="reply-preview" id="reply-preview"></div>
      <input id="reply-name" type="text" placeholder="名字（可不填）" maxlength="16" autocomplete="off" />
      <textarea id="reply-text" placeholder="写下你的回复 ✨" maxlength="100" rows="3"></textarea>
      <div class="modal-btns">
        <button class="btn-cancel" id="reply-cancel">取消</button>
        <button class="btn-confirm" id="reply-confirm">发送</button>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
