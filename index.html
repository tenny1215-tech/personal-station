<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="投资账本">
<title>Tenny 投资账本</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 密码锁屏 -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon">📊</div>
    <div class="lock-title">投资账本</div>
    <div class="lock-sub">请输入密码</div>
    <input type="password" id="lock-input" placeholder="密码" autocomplete="off">
    <div id="lock-error"></div>
    <button id="lock-btn">进入</button>
  </div>
</div>

<!-- 主应用 -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-title">📊 投资账本</div>
    <button class="topbar-lock" id="logout-btn">🔒</button>
  </div>

  <div id="page-overview" class="page active">
    <div class="section-title">总览</div>
    <div class="summary-grid" id="overview-grid"></div>
    <div class="section-title">转账汇总</div>
    <div class="card" id="flow-summary"></div>
    <div class="section-title">我的持仓</div>
    <div id="overview-holdings"></div>
  </div>

  <div id="page-transfers" class="page">
    <div class="section-title">转账记录</div>
    <div id="transfer-list"></div>
  </div>

  <div id="page-holdings" class="page">
    <div class="section-title">持仓明细</div>
    <div id="holdings-list"></div>
  </div>

  <div id="page-income" class="page">
    <div class="section-title">收入记录</div>
    <div id="income-list"></div>
  </div>

  <button class="fab" id="fab">＋</button>

  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-overview"><span class="nav-icon">📊</span>总览</button>
    <button class="nav-item" id="nav-transfers"><span class="nav-icon">💸</span>转账</button>
    <button class="nav-item" id="nav-holdings"><span class="nav-icon">📈</span>持仓</button>
    <button class="nav-item" id="nav-income"><span class="nav-icon">💰</span>收入</button>
  </nav>
</div>

<!-- 弹窗：选择类型 -->
<div class="modal-overlay" id="modal-select">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">添加什么？</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-ghost" id="btn-add-transfer">💸 转账记录</button>
      <button class="btn btn-ghost" id="btn-add-holding">📈 买入股票 / ETF</button>
      <button class="btn btn-ghost" id="btn-add-income">💰 利息 / 股息收入</button>
      <button class="btn btn-ghost muted" id="btn-cancel-select">取消</button>
    </div>
  </div>
</div>

<!-- 弹窗：转账 -->
<div class="modal-overlay" id="modal-transfer">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">转账记录</div>

    <input type="hidden" id="t-edit-id">

    <!-- 第一步 -->
    <div class="step-header">
      <div class="step-num">1</div>
      <div class="step-label">换汇</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">购买美金 $</label>
        <input class="form-input" id="t-usd-bought" type="number" placeholder="如：17500" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">花费人民币 ¥</label>
        <input class="form-input" id="t-cny-spent" type="number" placeholder="如：120402" step="0.01">
      </div>
    </div>
    <div class="auto-calc" id="calc-rate">填写以上两栏自动计算汇率</div>

    <!-- 第二步 -->
    <div class="step-header">
      <div class="step-num">2</div>
      <div class="step-label">汇出（建行 → 汇丰）</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">汇出美金 $</label>
        <input class="form-input" id="t-usd-sent" type="number" placeholder="如：17500.61" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">邮电费+手续费 ¥</label>
        <input class="form-input" id="t-wire-fee" type="number" placeholder="如：159.71" step="0.01">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">汇丰剩余余额 $</label>
        <input class="form-input" id="t-hsbc-remaining" type="number" placeholder="未全转走时填写" step="0.01">
      </div>
      <div class="form-group">
        <!-- 占位 -->
      </div>
    </div>

    <!-- 第三步 -->
    <div class="step-header">
      <div class="step-num">3</div>
      <div class="step-label">IBKR 到账</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">IBKR 到账金额 $</label>
        <input class="form-input" id="t-ibkr" type="number" placeholder="如：17400" step="0.01">
      </div>
      <div class="form-group">
        <!-- ✅ 改名：电汇手续费（汇丰扣） -->
        <label class="form-label">电汇手续费 $（汇丰扣）</label>
        <input class="form-input" id="t-ibkr-fee" type="number" placeholder="如：21.75" step="0.01">
      </div>
    </div>

    <!-- 自动汇总预览 -->
    <div class="preview-box" id="t-preview">
      <div class="preview-label-title">📋 此次转账汇总</div>
      <div class="preview-grid" id="t-preview-content"></div>
    </div>

    <div class="form-row" style="margin-top:4px">
      <div class="form-group">
        <label class="form-label">日期</label>
        <input class="form-input" id="t-date" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">备注（可选）</label>
        <input class="form-input" id="t-note" type="text" placeholder="如：两次换汇合并">
      </div>
    </div>

    <!-- ✅ 上传截图（Base64，存 Firestore，无需 Firebase Storage） -->
    <div class="form-group" style="margin-top:4px">
      <label class="form-label">📎 上传截图 / 凭证（可选）</label>
      <label class="upload-label" for="t-file">
        <span class="upload-icon">🖼️</span>
        <span id="upload-text">点击选择图片（自动压缩后保存）</span>
        <input type="file" id="t-file" accept="image/*" style="display:none">
      </label>
      <div id="upload-preview"></div>
      <div id="existing-attachment" style="display:none"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" id="btn-transfer-cancel">取消</button>
      <button class="btn btn-primary" id="btn-transfer-save">保存</button>
    </div>
  </div>
</div>

<!-- 弹窗：持仓 -->
<div class="modal-overlay" id="modal-holding">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="holding-modal-title">买入股票</div>
    <input type="hidden" id="h-edit-id">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">股票代码</label>
        <input class="form-input" id="h-ticker" type="text" placeholder="如：MSFT">
      </div>
      <div class="form-group">
        <label class="form-label">名称（可选）</label>
        <input class="form-input" id="h-name" type="text" placeholder="如：微软">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">买入价 $</label>
        <input class="form-input" id="h-price" type="number" placeholder="如：416" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">股数</label>
        <input class="form-input" id="h-shares" type="number" placeholder="如：3" step="0.01">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">交易佣金 $</label>
        <input class="form-input" id="h-commission" type="number" placeholder="如：1.5" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">当前价格 $</label>
        <input class="form-input" id="h-current" type="number" placeholder="如：420" step="0.01">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">买入日期</label>
        <input class="form-input" id="h-date" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">类型</label>
        <select class="form-input" id="h-type">
          <option value="stock">股票</option>
          <option value="etf">ETF</option>
          <option value="bond-etf">债券ETF（IBTU）</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="btn-holding-cancel">取消</button>
      <button class="btn btn-primary" id="btn-holding-save">保存</button>
    </div>
  </div>
</div>

<!-- 弹窗：收入 -->
<div class="modal-overlay" id="modal-income">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">收入记录</div>
    <div class="form-group">
      <label class="form-label">类型</label>
      <select class="form-input" id="i-type">
        <option value="interest">利息（如 IBTU）</option>
        <option value="dividend">股息</option>
        <option value="other">其他</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">来源</label>
        <input class="form-input" id="i-ticker" type="text" placeholder="如：IBTU">
      </div>
      <div class="form-group">
        <label class="form-label">金额 $</label>
        <input class="form-input" id="i-amount" type="number" placeholder="如：195" step="0.01">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">日期</label>
      <input class="form-input" id="i-date" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">备注</label>
      <input class="form-input" id="i-note" type="text" placeholder="如：IBTU 3月派息">
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="btn-income-cancel">取消</button>
      <button class="btn btn-primary" id="btn-income-save">保存</button>
    </div>
  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
