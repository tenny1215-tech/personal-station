<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tenny's Station — 留言板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="topbar-left">
      <span class="topbar-title">Tenny's Station</span>
      <span class="topbar-sub">· 留言板</span>
    </div>
    <div class="topbar-center">
      <button class="zoom-btn" id="zoom-out">−</button>
      <span class="zoom-label" id="zoom-label">100%</span>
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-reset" title="重置视图">⌂</button>
    </div>
    <div class="topbar-right">
      <span class="note-count" id="note-count">0 条留言</span>
    </div>
  </div>

  <!-- CANVAS WRAPPER -->
  <div id="canvas-wrap">
    <!-- dot grid background -->
    <svg id="grid-bg" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <defs>
        <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="1" fill="#d1d5db" />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#dots)" />
    </svg>

    <!-- infinite canvas -->
    <div id="canvas"></div>
  </div>

  <!-- BOTTOM INPUT BAR -->
  <div id="inputbar">
    <input class="inp-name" id="inp-name" type="text" placeholder="你的名字（可匿名）" maxlength="16" />
    <div class="inp-divider"></div>
    <input class="inp-text" id="inp-text" type="text" placeholder="说点什么吧 ✨" maxlength="100" />
    <button class="inp-send" id="inp-send">发送</button>
  </div>

  <!-- DELETE MODAL -->
  <div id="delete-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-title">🗑️ 删除留言</div>
      <div class="modal-desc">输入留言时给你的 6 位删除码</div>
      <input class="modal-input" id="modal-code" type="text" placeholder="123456" maxlength="6" />
      <div class="modal-error" id="modal-error"></div>
      <div class="modal-btns">
        <button class="modal-cancel" id="modal-cancel">取消</button>
        <button class="modal-confirm" id="modal-confirm">确认删除</button>
      </div>
    </div>
  </div>

  <!-- CODE TOAST -->
  <div id="code-toast" class="code-toast" style="display:none">
    <div class="toast-emoji">🔑</div>
    <div class="toast-title">你的删除码</div>
    <div class="toast-code" id="toast-code-val"></div>
    <div class="toast-hint">截图保存！1 小时内有效</div>
    <button class="toast-close" id="toast-close">知道了</button>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
